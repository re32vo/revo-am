kind = "web"
previewPath = "/"
title = "خدماتي البرمجية"
version = "1.0.0"
id = "artifacts/services-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20906

[services.development]
run = "pnpm --filter @workspace/services-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/services-portfolio", "run", "build" ]
publicDir = "artifacts/services-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20906"
BASE_PATH = "/"
